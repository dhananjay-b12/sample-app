name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Set image tag
      id: vars
      run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sample-app:${{ env.TAG }} .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/sample-app:${{ env.TAG }} 
    
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > kubeconfig
        mkdir -p $HOME/.kube
        mv kubeconfig $HOME/.kube/config
        
    - name: Verify cluster
      run: kubectl get nodes
      
    - name: Install Helm
      uses: azure/setup-helm@v4
      
    - name: Deploy with Helm
      run: |
        helm upgrade --install sample-app ./sample-app-chart \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/sample-app \
          --set image.tag=${{ env.TAG }}
    
